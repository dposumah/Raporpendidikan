name: Supabase Keep Alive Cron

on:
  schedule:
    # Runs every 3 days at 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Keep Alive Endpoint
        run: |
          curl -sSf https://dikbud-raporpendidikan.vercel.app/api/keep-alive || echo "Ping failed"
